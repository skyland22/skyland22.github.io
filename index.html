                {id:13,title:"在应用系统软件更新后,如果发现新版本存在问题,应该如何处理?",opts:["A.回滚到上一个版本","B.继续使用新版本,等待后续修复","C.查找解决方法并进行修复","D.放弃使用该软件"],ans:"AC"},
                {id:14,title:"在进行应用系统软件更新时,如果需要联网下载更新包,应该注意哪些事项?",opts:["A.确认网络连接正常","B.确认网络下载速度","C.确认下载地址的正确性","D.确认网络费用是否充足"],ans:"AC"},
                {id:15,title:"在进行应用系统软件更新时,如果需要使用USB 离线更新,应该注意哪些事项?",opts:["A.确认更新包存储位置","B.确认USB 存储设备的正确性","C.确认USB 接口是否损坏","D.确认USB 存储设备是否格式化"],ans:"AC"},
                {id:16,title:"市场环境调研的主要内容包括:",opts:["A.宏观环境调研","B.需求市场调研","C.竞争环境调研","D.供应市场调研"],ans:"ABCD"},
                {id:17,title:"消费者调研主要包括:",opts:["A.消费者购买意愿调研","B.消费者购买动机调研","C.消费者购买行为调研","D.消费者人口状况调研"],ans:"BCD"},
                {id:18,title:"下列哪些是Zigbee 技术的应用之一?",opts:["A.智能家居","B.工业自动化","C.家庭娱乐","D.智能电网"],ans:"ABD"},
                {id:19,title:"下列哪些是蓝牙技术的应用之一?",opts:["A.耳机音频传输","B.汽车导航系统","C.无线游戏手柄","D.机器人控制系统"],ans:"AC"},
                {id:20,title:"在STM32F407 芯片中,下列哪些定时器可以输出PWM 信号?",opts:["A.TIM1","B.TIM2","C.TIM3","D.TIM4"],ans:"ABC"},
                {id:21,title:"以下哪些方法可以用于探索性调研?",opts:["A.观察法调研","B.案例分析","C.问卷调研","D.知情者调研"],ans:"ABD"},
                {id:22,title:"以下哪些特点是描述性调研的特点?",opts:["A.调研方式灵活","B.调研对象广泛","C.调查结果量化","D.调研目的明确"],ans:"CD"},
                {id:23,title:"问卷设计的主要优点有哪些?",opts:["A.标准化","B.操作容易","C.便于揭示隐性的问题","D.便于分析子群差异"],ans:"ABCD"},
                {id:24,title:"在TIM 定时器的PWM 模式下,占空比的计算方法是什么?",opts:["A.占空比 =CCRx / ARR","B.占空比 =CCRx /","C.占空比 =ARR / CCRx","D.占空比 =/ CCRx"],ans:"AB"},
                {id:25,title:"下列哪些是TIM 定时器的输入捕获模式?",opts:["A.PWM 输入模式","B.TI1 输入模式","C.TI2 输入模式","D.脉冲计数模式"],ans:"BC"},
                {id:26,title:"TIM 定时器在计数器溢出时会发生什么?",opts:["A.定时器会自动清零计数器","B.定时器会产生溢出中断","C.定时器会停止计数","D.定时器会重载计数器值"],ans:"AB"},
                {id:27,title:"调查访问法的具体形式包括｡",opts:["A.网络访问","B.个人访问","C.邮寄问卷","D.电话访问"],ans:"ABCD"},
                {id:28,title:"以下哪些情况会导致液压系统的压力过高?",opts:["A.油泵输出流量过大","B.油泵输出流量过小","C.油液中的温度过高","D.液压缸的负载突然减轻"],ans:"ACD"},
                {id:29,title:"在工业生产中,以下哪些因素会影响设备的寿命?",opts:["A.工作温度","B.工作湿度","C.工作负荷","D.工作环境中的腐蚀物质"],ans:"BCD"},
                {id:30,title:"调查时间的安排主要涉及以下三个方面,即",opts:["A.安排调查标准时间","B.安排调查时期","C.调查人员的身体状况","D.被调查单位的工作安排","E.调查时间安排还需考虑季节的因素"],ans:"ABE"},
                {id:31,title:"市场调查收集资料的基本方法有｡",opts:["A.访问法","B.时间序列法","C.实验法","D.态度测量表法"],ans:"AC"},
            ],
            judge: [
                {id:1,title:"判断题：市场调研的第一步是明确调查目的。",opts:["正确","错误"],ans:"A"},
                {id:2,title:"判断题：所有多选题的答案都可以按任意顺序填写。",opts:["正确","错误"],ans:"B"},
                {id:3,title:"判断题：在线答题系统可以保存用户的历史答题记录。",opts:["正确","错误"],ans:"A"},
                {id:4,title:"判断题：判断题的选项通常为“正确”和“错误”。",opts:["正确","错误"],ans:"A"},
                {id:5,title:"判断题：页面中没有加入 localStorage 时,刷新后仍然会保留答案。",opts:["正确","错误"],ans:"B"}
            ]
        };

        const container = document.getElementById('container');
        const typeTabs = document.querySelectorAll('.tab-item');
        const doneCountEl = document.getElementById('doneCount');
        const totalCountEl = document.getElementById('totalCount');
        const rateEl = document.getElementById('rate');
        const showAllBtn = document.getElementById('showAllAns');
        const resetBtn = document.getElementById('resetAll');

        let currentType = 'single';
        const answerState = { single: {}, multi: {}, judge: {} };
        const STORAGE_KEY = 'siplib-answer-state';

        function loadAnswerState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const saved = JSON.parse(raw);
                if (saved.single && typeof saved.single === 'object') answerState.single = saved.single;
                if (saved.multi && typeof saved.multi === 'object') answerState.multi = saved.multi;
                if (saved.judge && typeof saved.judge === 'object') answerState.judge = saved.judge;
            } catch (e) {
                console.warn('loadAnswerState failed', e);
            }
        }

        function saveAnswerState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(answerState));
            } catch (e) {
                console.warn('saveAnswerState failed', e);
            }
        }

        loadAnswerState();

        function getQuestionById(type, id) {
            const list = questionData[type] || [];
            return list.find(item => String(item.id) === String(id));
        }

        function restoreSelections(type) {
            const list = questionData[type] || [];
            list.forEach(item => {
                const answer = answerState[type][item.id];
                if (!answer) return;
                const opts = container.querySelectorAll(`.opt-item[data-id="${item.id}"]`);
                if (type === 'multi') {
                    opts.forEach(el => {
                        el.classList.toggle('opt-right', answer.includes(el.dataset.key));
                        el.classList.toggle('opt-wrong', false);
                    });
                    showAnswerTip(type, item.id, `已选：${answer || '无'}`, false);
                } else {
                    const isCorrect = answer === item.ans;
                    opts.forEach(el => {
                        el.classList.remove('opt-right', 'opt-wrong');
                        if (el.dataset.key === item.ans) {
                            el.classList.add('opt-right');
                        }
                        if (el.dataset.key === answer && el.dataset.key !== item.ans) {
                            el.classList.add('opt-wrong');
                        }
                    });
                    if (answer) {
                        showAnswerTip(type, item.id, `标准答案：${item.ans}`, isCorrect);
                    }
                }
            });
        }

        function updateStats() {
            const list = questionData[currentType] || [];
            let done = 0;
            let correct = 0;

            list.forEach(item => {
                const answer = answerState[currentType][item.id];
                if (!answer) return;
                done += 1;
                if (currentType === 'multi') {
                    const selected = answer.split('').sort().join('');
                    const right = item.ans.split('').sort().join('');
                    if (selected === right) correct += 1;
                } else {
                    if (answer === item.ans) correct += 1;
                }
            });

            doneCountEl.textContent = done;
            totalCountEl.textContent = list.length;
            rateEl.textContent = list.length ? `${Math.round((correct / list.length) * 100)}%` : '0%';
        }

        function showAnswerTip(type, id, text, isCorrect) {
            const tip = document.getElementById(`tip-${type}-${id}`);
            if (!tip) return;
            tip.textContent = text;
            tip.classList.remove('answer-correct', 'answer-wrong');
            tip.classList.add('answer-tip', isCorrect ? 'answer-correct' : 'answer-wrong');
            tip.style.display = 'block';
        }

        function renderQuestions(type) {
            currentType = type;
            const list = questionData[type] || [];
            if (!list.length) {
                container.innerHTML = `
                    <div class="question-wrap">
                        <div class="q-title">当前题型暂无题目。</div>
                    </div>`;
                typeTabs.forEach(tab => {
                    tab.classList.toggle('tab-active', tab.dataset.type === type);
                });
                updateStats();
                return;
            }

            container.innerHTML = list.map((item, index) => {
                const optionsHtml = item.opts.map((text, idx) => {
                    const key = String.fromCharCode(65 + idx);
                    return `
                        <div class="opt-item" data-id="${item.id}" data-key="${key}">
                            <span class="opt-label">${key}.</span>
                            <span>${text}</span>
                        </div>`;
                }).join('');

                return `
                    <div class="question-wrap">
                        <div class="q-title"><span class="q-index">${index + 1}.</span>${item.title}</div>
                        <div class="options">${optionsHtml}</div>
                        <div class="answer-tip" id="tip-${type}-${item.id}"></div>
                    </div>`;
            }).join('');

            restoreSelections(type);
            typeTabs.forEach(tab => {
                tab.classList.toggle('tab-active', tab.dataset.type === type);
            });

            updateStats();
        }

        container.addEventListener('click', event => {
            const opt = event.target.closest('.opt-item');
            if (!opt) return;
            const qid = opt.dataset.id;
            const key = opt.dataset.key;
            const question = getQuestionById(currentType, qid);
            if (!question) return;

            if (currentType === 'multi') {
                const current = answerState.multi[qid] || '';
                const next = current.includes(key) ? current.replace(key, '') : (current + key).split('').sort().join('');
                if (next) {
                    answerState.multi[qid] = next;
                } else {
                    delete answerState.multi[qid];
                }

                const opts = container.querySelectorAll(`.opt-item[data-id="${qid}"]`);
                opts.forEach(el => {
                    const selected = answerState.multi[qid] && answerState.multi[qid].includes(el.dataset.key);
                    el.classList.toggle('opt-right', selected);
                    el.classList.toggle('opt-wrong', false);
                });

                showAnswerTip(currentType, qid, `已选：${answerState.multi[qid] || '无'}`, false);
                updateStats();
                saveAnswerState();
                return;
            }

            answerState[currentType][qid] = key;
            const opts = container.querySelectorAll(`.opt-item[data-id="${qid}"]`);
            const isCorrect = key === question.ans;
            opts.forEach(el => {
                el.classList.remove('opt-right', 'opt-wrong');
                if (el.dataset.key === question.ans) {
                    el.classList.add('opt-right');
                } else if (el.dataset.key === key) {
                    el.classList.add(isCorrect ? 'opt-right' : 'opt-wrong');
                }
            });

            showAnswerTip(currentType, qid, `标准答案：${question.ans}`, isCorrect);
            updateStats();
            saveAnswerState();
        });

        typeTabs.forEach(tab => {
            tab.addEventListener('click', () => renderQuestions(tab.dataset.type));
        });

        showAllBtn.addEventListener('click', () => {
            (questionData[currentType] || []).forEach(item => {
                const opts = container.querySelectorAll(`.opt-item[data-id="${item.id}"]`);
                opts.forEach(el => {
                    el.classList.toggle('opt-right', el.dataset.key === item.ans);
                    el.classList.toggle('opt-wrong', false);
                });
                showAnswerTip(currentType, item.id, `标准答案：${item.ans}`, true);
            });
        });

        resetBtn.addEventListener('click', () => {
            answerState.single = {};
            answerState.multi = {};
            answerState.judge = {};
            localStorage.removeItem(STORAGE_KEY);
            renderQuestions(currentType);
        });

        renderQuestions(currentType);
    </script>
</body>
